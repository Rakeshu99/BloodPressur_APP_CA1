name: CI Pipeline - Build, Test, Coverage, SonarCloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, Coverage, OWASP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Restore
      - name: Restore
        run: dotnet restore

      # Build
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Run all tests + coverage
      - name: Run All Tests (Unit + BDD)
        run: |
          mkdir -p TestResults
          mkdir -p coverage

          dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutput=coverage/unit_ \
            /p:CoverletOutputFormat=opencover

          dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
            --logger "trx;LogFileName=bdd.trx" \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutput=coverage/bdd_ \
            /p:CoverletOutputFormat=opencover

      # Upload combined artifact
      - name: Upload Test + Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage
          path: |
            TestResults/**/*.trx
            coverage/**/*.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Test + Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: test-and-coverage  # MUST MATCH upload name
          path: TestResults         # Extract here

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/*.xml
            -Dsonar.cs.vstest.reportsPaths=TestResults/**/*.trx
