name: CI Pipeline - Build, Test, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------------------------
    # 1. CHECKOUT
    # -------------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -------------------------------------------------
    # 2. OWASP DEPENDENCY CHECK
    # -------------------------------------------------
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-depcheck

    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure"
        path: "."
        format: "HTML"
        out: "dependency-check-output"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-output

    # -------------------------------------------------
    # 3. SETUP .NET 9 SDK
    # -------------------------------------------------
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # Install reportgenerator (required to convert coverage → XML)
    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    # -------------------------------------------------
    # 4. SONAR - BEGIN
    # -------------------------------------------------
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: SonarCloud - Begin
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.vstest.reportsPaths="TestResults/**/*.trx" \
          /d:sonar.coverageReportPaths="coverage/Cobertura.xml"

    # -------------------------------------------------
    # 5. RESTORE + BUILD
    # -------------------------------------------------
    - name: Restore
      run: dotnet restore

    - name: Build Release
      run: dotnet build --configuration Release --no-restore

    # -------------------------------------------------
    # 6. RUN TESTS (UNIT + BDD) WITH COVERAGE
    # -------------------------------------------------
    - name: Run All Tests (Unit + BDD) With Built-In Coverage
      run: |
        dotnet test --configuration Release \
          --collect:"XPlat Code Coverage" \
          --logger "trx;LogFileName=test_results.trx"

    # -------------------------------------------------
    # 7. CONVERT COVERAGE TO COBERTURA
    # -------------------------------------------------
    - name: Convert Coverage to Cobertura XML
      run: |
        reportgenerator \
          -reports:"**/coverage.cobertura.xml" \
          -targetdir:"coverage" \
          -reporttypes:Cobertura

    # -------------------------------------------------
    # 8. UPLOAD ARTIFACTS
    # -------------------------------------------------
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/**/*.trx

    - name: Upload Coverage Report (Cobertura XML)
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/Cobertura.xml

    # -------------------------------------------------
    # 9. SONAR END
    # -------------------------------------------------
    - name: SonarCloud - End
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
