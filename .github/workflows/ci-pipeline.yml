name: Local CI Pipeline - Build, Test, and SonarCloud Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, and Analyze Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --configuration Release

      # ✅ Use Coverlet for reliable Code Coverage
      - name: Run Unit Tests with Coverage
        run: |
          mkdir -p coverage
          dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutput=coverage/ \
            /p:CoverletOutputFormat=opencover

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestProject1.Unit.tests/TestResults/**/*.trx

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/*.xml

  sonar:
    name: SonarCloud Analysis
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
            -Dsonar.cs.opencover.reportsPaths=coverage/*.xml
            -Dsonar.cs.vstest.reportsPaths=TestProject1.Unit.tests/TestResults/**/*.trx
