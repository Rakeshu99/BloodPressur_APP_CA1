name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # --- Dependency Check ---
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-depcheck

    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure"
        path: "."
        format: "HTML"
        out: "dependency-check-output"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-output

    # --- Install SonarScanner ---
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    # --- Sonar Begin ---
    - name: SonarCloud Begin
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx" \
          /d:sonar.cs.cobertura.reportsPaths="TestResults/**/coverage.cobertura.xml" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

    # --- Restore + Build ---
    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    # --- Run Unit + BDD Tests with Built-in Coverage ---
    - name: Run ALL Tests (Unit + BDD)
      run: |
        mkdir -p TestResults

        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=unit_results.trx" \
          --results-directory TestResults \
          --collect:"XPlat Code Coverage"

        dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=bdd_results.trx" \
          --results-directory TestResults \
          --collect:"XPlat Code Coverage"

    - name: Upload Test Results + Coverage
      uses: actions/upload-artifact@v4
      with:
        name: test-and-coverage
        path: TestResults

    # --- Sonar End ---
    - name: SonarCloud End
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
