name: CI Pipeline - Build, Test, Coverage, SonarCloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, Coverage, OWASP
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Run Tests (Unit + BDD) with Coverage
      run: |
        mkdir -p TestResults
        dotnet test --configuration Release \
          --results-directory TestResults \
          --logger "trx;LogFileName=test_results.trx" \
          --collect:"XPlat Code Coverage"

    - name: Upload Test & Coverage Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-artifacts
        path: TestResults/**
        retention-days: 3

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Coverage Artifacts
      uses: actions/download-artifact@v4
      with:
        name: coverage-artifacts
        path: coverage

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
      with:
        args: >
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
          -Dsonar.cs.opencover.reportsPaths=coverage/**/coverage.cobertura.xml
          -Dsonar.cs.vstest.reportsPaths=coverage/**/test_results.trx
