name: Local CI Pipeline - Build, Test, and SonarCloud Scan

on:
  push:
    branches:
      - main    # Trigger only on pushes to the main branch
  workflow_dispatch:   # Allows manual triggering of the workflow

jobs:
  build:
    name: Build, Test, and Analyze Project
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up .NET SDK
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build the project
      - name: Build the project
        run: dotnet build --configuration Release

      # Step 5: Run Unit Tests with Code Coverage
      - name: Run Unit Tests with Coverage
        run: |
          mkdir -p TestResults

          dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
            --configuration Release \
            --no-build \
            --results-directory TestResults \
            --logger "trx;LogFileName=test_results.trx" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
            --verbosity normal

      # Step 6: Upload Test Results
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/test_results.trx

      # Step 7: Upload Code Coverage
      - name: Upload Code Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/coverage.opencover.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java (required for SonarScanner)
      - name: Set up Java (SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: SonarCloud Scan
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: 'https://sonarcloud.io'
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
            -Dsonar.cs.vstest.reportsPaths=TestResults/**/test_results.trx
