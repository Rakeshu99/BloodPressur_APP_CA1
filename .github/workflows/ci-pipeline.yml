name: CI Pipeline - Build, Test, BDD, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------------------------
    # 1. CHECKOUT
    # -------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------------------------------
    # 2. OWASP DEPENDENCY CHECK
    # -------------------------------------------------
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-depcheck

    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure"
        path: "."
        format: "HTML"
        out: "dependency-check-output"

    - name: Upload OWASP Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-output

    # -------------------------------------------------
    # 3. SETUP .NET SDK
    # -------------------------------------------------
    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # -------------------------------------------------
    # 4. INSTALL SONAR SCANNER
    # -------------------------------------------------
    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    # -------------------------------------------------
    # 5. SONAR BEGIN
    # -------------------------------------------------
    - name: SonarCloud - Begin Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx" \
          /d:sonar.cs.opencover.reportsPaths="coverage/*.xml"

    # -------------------------------------------------
    # 6. RESTORE + BUILD
    # -------------------------------------------------
    - name: Restore packages
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    # -------------------------------------------------
    # 7. RUN UNIT TESTS + BDD TESTS + COVERAGE
    # -------------------------------------------------
    - name: Run ALL Tests (Unit + BDD) with coverage
      run: |
        mkdir -p coverage
        mkdir -p TestResults

        echo "Running UNIT TESTS..."
        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=unit_tests.trx" \
          --results-directory TestResults \
          /p:CollectCoverage=true \
          /p:CoverletOutput=$(pwd)/coverage/unit_ \
          /p:CoverletOutputFormat=opencover

        echo "Running BDD TESTS..."
        dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=bdd_tests.trx" \
          --results-directory TestResults \
          /p:CollectCoverage=true \
          /p:CoverletOutput=$(pwd)/coverage/bdd_ \
          /p:CoverletOutputFormat=opencover

    # -------------------------------------------------
    # 8. UPLOAD TEST RESULTS + COVERAGE
    # -------------------------------------------------
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/*.trx

    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/*.xml

    # -------------------------------------------------
    # 9. SONAR END
    # -------------------------------------------------
    - name: SonarCloud - End Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
