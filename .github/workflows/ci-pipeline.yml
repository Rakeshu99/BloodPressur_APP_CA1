name: CI Pipeline - Build, Test, Coverage, SonarCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # 3. Restore
      - name: Restore Packages
        run: dotnet restore

      # 4. Build
      - name: Build Solution
        run: dotnet build --configuration Release --no-restore

      # 5. RUN UNIT + BDD TESTS (Both produce trx + coverage)
      - name: Run All Tests with Coverage
        run: |
          mkdir -p TestResults
          
          echo "Running UNIT Tests..."
          dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=unit.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

          echo "Running BDD Tests..."
          dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=bdd.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      # 6. Upload ALL test + coverage results
      - name: Upload Test + Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage
          path: TestResults/**/*
          if-no-files-found: warn

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Download test results + coverage
      - name: Download Coverage Results
        uses: actions/download-artifact@v4
        with:
          name: test-and-coverage
          path: TestResults

      # 3. Setup Java for Sonar
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 4. SonarCloud Scan
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
            -Dsonar.cs.vstest.reportsPaths=TestResults/**/*.trx
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/*.xml
