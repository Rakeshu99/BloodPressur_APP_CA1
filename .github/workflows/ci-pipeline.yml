name: CI Pipeline - Build, Test, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------------------------
    # 1. CHECKOUT
    # -------------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -------------------------------------------------
    # 2. OWASP DEPENDENCY CHECK
    # -------------------------------------------------
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-depcheck

    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure"
        path: "."
        format: "HTML"
        out: "dependency-check-output"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-output

    # -------------------------------------------------
    # 3. .NET SETUP
    # -------------------------------------------------
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # -------------------------------------------------
    # 4. SONAR BEGIN
    # -------------------------------------------------
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: SonarCloud - Begin
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="coverage/*.xml"

    # -------------------------------------------------
    # 5. BUILD + RESTORE
    # -------------------------------------------------
    - name: Restore
      run: dotnet restore

    - name: Build Release
      run: dotnet build --configuration Release --no-restore

    # -------------------------------------------------
    # 6. UNIT TESTS + COVERAGE
    # -------------------------------------------------
    - name: Run Unit Tests With Coverage
      run: |
        mkdir -p coverage
        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release --no-build \
          /p:CollectCoverage=true \
          /p:CoverletOutput=$(pwd)/coverage/ \
          /p:CoverletOutputFormat=opencover

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/*.xml

    # -------------------------------------------------
    # 7. SONAR END
    # -------------------------------------------------
    - name: SonarCloud - End
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
