name: CI Pipeline - Build, Test, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------------------
    # 1. CHECKOUT REPOSITORY
    # ----------------------------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ----------------------------------------------------
    # 2. OWASP DEPENDENCY CHECK
    # ----------------------------------------------------
    - name: Cache Dependency Check Database
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-dc
        restore-keys: |
          ${{ runner.os }}-dc

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure_APP"
        path: "."
        format: "HTML"
        out: "dependency-check-report"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-report

    # ----------------------------------------------------
    # 3. SETUP .NET 9
    # ----------------------------------------------------
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # ----------------------------------------------------
    # 4. INSTALL SONAR SCANNER
    # ----------------------------------------------------
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    # ----------------------------------------------------
    # 5. SONAR CLOUD - BEGIN ANALYSIS
    # ----------------------------------------------------
    - name: SonarCloud - Begin Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="coverage/*.xml"

    # ----------------------------------------------------
    # 6. RESTORE & BUILD
    # ----------------------------------------------------
    - name: Restore Packages
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore

    # ----------------------------------------------------
    # 7. RUN TESTS + COVERAGE
    # ----------------------------------------------------
    - name: Run Unit Tests with Coverage
      run: |
        mkdir -p coverage

        echo "Running UNIT TESTS..."
        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          --no-build \
          /p:CollectCoverage=true \
          /p:CoverletOutput=$(pwd)/coverage/ \
          /p:CoverletOutputFormat=opencover

    # ----------------------------------------------------
    # 8. UPLOAD COVERAGE ARTIFACTS
    # ----------------------------------------------------
    - name: Upload Coverage Report
      uses: actions/up
