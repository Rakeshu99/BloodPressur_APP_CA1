name: CI Pipeline - Build, Test, Coverage, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build, Test, Coverage, OWASP
    runs-on: ubuntu-latest

    steps:
    # -------------------------------
    # 1. CHECKOUT CODE
    # -------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -------------------------------
    # 2. SETUP .NET 9
    # -------------------------------
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # -------------------------------
    # 3. OWASP DEPENDENCY CHECK
    # -------------------------------
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-depcheck

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "BloodPressure"
        path: "."
        format: "HTML"
        out: "dependency-check-report"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-report/

    # -------------------------------
    # 4. RESTORE + BUILD
    # -------------------------------
    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration Release --no-restore

    # -------------------------------
    # 5. RUN UNIT + BDD TESTS WITH COVERAGE
    # -------------------------------
    - name: Run Unit + BDD Tests with Coverage
      run: |
        mkdir -p coverage

        echo "Running UNIT TESTS..."
        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          /p:CollectCoverage=true \
          /p:CoverletOutput=coverage/unit_ \
          /p:CoverletOutputFormat=opencover

        echo "Running BDD TESTS..."
        dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
          --configuration Release \
          /p:CollectCoverage=true \
          /p:CoverletOutput=coverage/bdd_ \
          /p:CoverletOutputFormat=opencover

    # -------------------------------
    # 6. UPLOAD ARTIFACTS
    # -------------------------------
    - name: Upload Test Results + Coverage
      uses: actions/upload-artifact@v4
      with:
        name: test-and-coverage
        path: coverage/*.xml

  # ============================================================
  # SONARCLOUD ANALYSIS JOB
  # ============================================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Java required for SonarScanner
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Download coverage artifacts
    - name: Download Coverage Results
      uses: actions/download-artifact@v4
      with:
        name: test-and-coverage
        path: coverage

    # SonarCloud Scan
    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: 'https://sonarcloud.io'
      with:
        args: >
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
          -Dsonar.cs.opencover.reportsPaths=coverage/*.xml
