name: CI Pipeline - Build, Test, Coverage, SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build_test:
    name: Build, Test, Coverage, OWASP
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Setup .NET 9
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # 3. Restore
    - name: Restore
      run: dotnet restore

    # 4. Build
    - name: Build
      run: dotnet build --configuration Release --no-restore

    # 5. Run Tests + Coverage (Coverlet)
    - name: Run Unit & BDD Tests with Coverage
      run: |
        mkdir -p TestResults
        # Unit tests
        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          --results-directory TestResults \
          --logger "trx;LogFileName=unit.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutput=TestResults/coverage/unit.opencover.xml \
          /p:CoverletOutputFormat=opencover

        # BDD tests
        dotnet test BPCalculator.BDDTests/BPCalculator.BDDTests.csproj \
          --configuration Release \
          --results-directory TestResults \
          --logger "trx;LogFileName=bdd.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutput=TestResults/coverage/bdd.opencover.xml \
          /p:CoverletOutputFormat=opencover

    # 6. Upload Artifacts
    - name: Upload Test Results & Coverage
      uses: actions/upload-artifact@v4
      with:
        name: test-and-coverage
        path: |
          TestResults/**/*.trx
          TestResults/coverage/*.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build_test

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Test & Coverage Artifacts
      uses: actions/download-artifact@v4
      with:
        name: test-and-coverage
        path: TestResults

    # Required for SonarCloud Scanner v6
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: 17

    # SonarCloud Scan (v6)
    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: "https://sonarcloud.io"
      with:
        args: >
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
          -Dsonar.cs.vstest.reportsPaths=TestResults/**/*.trx
          -Dsonar.cs.opencover.reportsPaths=TestResults/coverage/*.xml
