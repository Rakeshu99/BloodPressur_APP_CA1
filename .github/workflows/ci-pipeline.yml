name: CI Pipeline - Build, Test, SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:

    # -------------------------------
    # 1. CHECKOUT
    # -------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -------------------------------
    # 2. OWASP DEPENDENCY CHECK
    # -------------------------------
    - name: Cache Dependency-Check Data
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check
        key: ${{ runner.os }}-dependency-check
        restore-keys: |
          ${{ runner.os }}-dependency-check

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "bp"
        path: "."
        format: "HTML"
        out: "dependency-check-output"

    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-check-output

    # -------------------------------
    # 3. .NET SETUP
    # -------------------------------
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    # -------------------------------
    # 4. SONAR CLOUD - BEGIN
    # -------------------------------
    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    - name: SonarCloud - Begin Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet-sonarscanner begin \
          /k:"${{ secrets.SONAR_PROJECT }}" \
          /o:"${{ secrets.SONAR_ORG }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="coverage/*.opencover.xml"

    # -------------------------------
    # 5. RESTORE + BUILD
    # -------------------------------
    - name: Restore
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore

    # -------------------------------
    # 6. UNIT TESTS + COVERAGE
    # -------------------------------
    - name: Run MSTest with coverage
      run: |
        mkdir -p coverage
        mkdir -p TestResults

        echo "Running UNIT TESTS..."

        dotnet test TestProject1.Unit.tests/TestProject1.Unit.tests.csproj \
          --configuration Release \
          --logger "trx;LogFileName=test_results.trx" \
          --results-directory TestResults \
          /p:CollectCoverage=true \
          /p:CoverletOutput=$(pwd)/coverage/unit \
          /p:CoverletOutputFormat=opencover

    - name: Upload Test Results (.trx)
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/test_results.trx

    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/*.opencover.xml

    # -------------------------------
    # 7. SONAR CLOUD - END
    # -------------------------------
    - name: SonarCloud - End Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
